<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Tree Admin</title>
  <style>
    :root { --ink:#17202c; --muted:#677080; --paper:#fffdf8; --accent:#1f7a8c; --line:#ded8cc; --soft:#f3eee4; --danger:#a04755; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:var(--soft); font-family:Inter,system-ui,sans-serif; }
    main { width:min(1100px,calc(100% - 28px)); margin:0 auto; padding:28px 0 60px; }
    nav { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
    a { color:var(--accent); font-weight:750; }
    header,.panel { background:var(--paper); border:1px solid var(--line); border-radius:8px; box-shadow:0 14px 36px rgba(24,33,47,.08); }
    header { padding:24px; margin-bottom:18px; }
    h1 { margin:4px 0 8px; font-family:Georgia,serif; font-size:clamp(2rem,6vw,3.5rem); }
    p { margin:0; color:var(--muted); line-height:1.45; }
    .panel { padding:22px; }
    .toolbar { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:12px; align-items:center; margin-bottom:16px; }
    input,button { min-height:42px; border:1px solid var(--line); border-radius:8px; background:#fffdf8; color:var(--ink); font:inherit; }
    input { width:100%; padding:0 12px; }
    button { padding:0 14px; cursor:pointer; font-weight:800; }
    button.danger { border-color:rgba(160,71,85,.5); color:var(--danger); }
    button.danger:hover { background:rgba(160,71,85,.08); }
    .person-list { display:grid; gap:10px; }
    .person-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:12px; align-items:center; padding:12px; border:1px solid var(--line); border-radius:8px; background:#fffdf8; }
    .person-row strong { display:block; }
    .meta { margin-top:3px; color:var(--muted); font-size:.88rem; }
    .status { min-height:24px; margin-bottom:12px; color:var(--accent); font-weight:750; }
    .status.error { color:var(--danger); }
    @media (max-width:720px) { .toolbar,.person-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <nav><a href="/">Back to Family</a><a href="tree.html">Family tree</a><a href="add-person.html">Add person</a></nav>
    <header>
      <p>Family tree data helper</p>
      <h1>Tree Admin</h1>
      <p>Delete people from the saved family tree data.</p>
    </header>

    <section class="panel">
      <div class="toolbar">
        <input id="person-search" type="search" placeholder="Search people" aria-label="Search people">
        <span id="person-count" class="meta"></span>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
      <div id="person-list" class="person-list"></div>
    </section>
  </main>

  <script src="tree-admin.js"></script>
</body>
</html>
