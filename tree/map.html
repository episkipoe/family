<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
   integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
   crossorigin=""/>
  <style>
    :root { --ink:#17202c; --muted:#677080; --paper:#fffdf8; --accent:#1f7a8c; --line:#ded8cc; --soft:#f3eee4; --danger:#a04755; --gold:#bb8a1d; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:var(--soft); font-family:Inter,system-ui,sans-serif; }
    main { width:min(1180px,calc(100% - 28px)); margin:0 auto; padding:28px 0 60px; }
    nav { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
    a { color:var(--accent); font-weight:750; }
    header,.panel { background:var(--paper); border:1px solid var(--line); border-radius:8px; box-shadow:0 14px 36px rgba(24,33,47,.08); }
    header { display:grid; gap:10px; padding:24px; margin-bottom:18px; }
    h1 { margin:0; font-family:Georgia,serif; font-size:clamp(2rem,6vw,3.6rem); line-height:.98; }
    p { margin:0; color:var(--muted); line-height:1.45; }
    label { display:grid; gap:6px; color:var(--muted); font-size:.78rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    input { width:min(320px,100%); min-height:36px; padding:8px 11px; border:1px solid var(--line); border-radius:8px; background:#fffdf8; color:var(--ink); font:inherit; letter-spacing:0; }
    .layout { display:grid; grid-template-columns:minmax(280px,.42fr) minmax(0,1fr); gap:18px; align-items:start; }
    .panel { padding:18px; }
    .map-panel { min-height:640px; padding:0; overflow:hidden; }
    .map-stage { min-height:640px; background:#d9eef2; }
    .family-marker { display:grid; min-width:28px; height:28px; place-items:center; padding:0 7px; border:2px solid #fffdf8; border-radius:999px; background:var(--danger); color:#fffdf8; font-size:.82rem; font-weight:900; box-shadow:0 6px 12px rgba(24,33,47,.26); }
    .family-popup { display:grid; gap:12px; min-width:min(360px,calc(100vw - 86px)); max-width:min(460px,calc(100vw - 86px)); color:var(--ink); }
    .family-popup strong { font-size:1.14rem; }
    .family-popup span { color:var(--muted); font-weight:750; }
    .family-popup ul { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px 14px; max-height:360px; margin:0; padding-left:18px; overflow:auto; }
    .family-popup a { color:var(--accent); font-weight:800; }
    .leaflet-popup-content-wrapper { border-radius:8px; }
    .leaflet-popup-content { margin:18px 20px; }
    .leaflet-container { font:inherit; }
    .location-list { display:grid; gap:10px; }
    .location-card { display:grid; gap:8px; padding:12px; border:1px solid var(--line); border-radius:8px; background:#fffdf8; }
    .location-card h2 { margin:0; color:var(--accent); font-size:1rem; }
    .name-list { display:flex; flex-wrap:wrap; gap:6px; }
    .person-link { display:inline-flex; align-items:center; min-height:30px; padding:6px 9px; border:1px solid rgba(31,122,140,.24); border-radius:8px; background:rgba(31,122,140,.08); color:var(--accent); font-size:.86rem; text-decoration:none; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; }
    .button-link { display:inline-flex; width:fit-content; align-items:center; justify-content:center; min-height:36px; padding:8px 11px; border:1px solid rgba(31,122,140,.26); border-radius:8px; background:rgba(31,122,140,.08); color:var(--accent); font:inherit; font-size:.86rem; font-weight:800; text-decoration:none; cursor:pointer; }
    .empty { padding:16px; color:var(--muted); }
    @media (max-width:860px) { .layout { grid-template-columns:1fr; } .map-panel,.map-stage { min-height:460px; } .family-popup ul { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <nav><a href="/">Back to Family</a><a href="tree.html">Family tree</a><a href="add-person.html">Add person</a></nav>
    <header>
      <p>Family map</p>
      <p id="map-summary"></p>
      <div class="toolbar">
        <label for="map-search">
          Search
          <input id="map-search" type="search" placeholder="Name or city" autocomplete="off">
        </label>
        <button id="show-all" class="button-link" type="button">Show all</button>
      </div>
    </header>

    <div class="layout">
      <section class="panel" aria-label="Locations">
        <div id="location-list" class="location-list"></div>
      </section>
      <section class="panel map-panel" aria-label="Map">
        <div id="family-map" class="map-stage" aria-label="Map of family member locations"></div>
      </section>
    </div>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="map-app.js"></script>
</body>
</html>
