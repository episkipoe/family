<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Family Gathering Archive</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body data-event-view="archive">
  <header class="hero archive-hero">
    <div>
      <p class="eyebrow">Family Gathering Planner</p>
      <h1>Past gatherings</h1>
      <p class="lede">Look back through family events that have already wrapped up.</p>
    </div>
  </header>

  <main>
    <section class="panel controls">
      <div class="identity-card">
        <span class="label-text">Posting as</span>
        <strong id="currentUserName">Not set</strong>
        <button id="changeNameButton" type="button">Change name</button>
      </div>
      <div class="control-actions">
        <a class="button-link" href="/">Home</a>
        <a class="button-link" href="/planning/">Planner</a>
        <a class="button-link" href="/planning/meal-planning.html">Meals</a>
        <a class="button-link" href="/games.html">Games</a>
        <a class="button-link" href="/planning/admin.html">Admin</a>
        <button id="addProposalButton" class="primary-action" type="button">Add event</button>
      </div>
    </section>

    <section id="proposalList" class="proposal-list" aria-live="polite"></section>

    <section class="panel list-tools" aria-label="Archived event filters">
      <div>
        <span class="label-text">Filter by year</span>
        <div id="yearFilters" class="segmented-controls"></div>
      </div>
      <div>
        <span class="label-text">Sort by date</span>
        <div class="segmented-controls">
          <button type="button" data-sort-direction="asc">Earliest</button>
          <button type="button" data-sort-direction="desc">Latest</button>
        </div>
      </div>
    </section>
  </main>

  <dialog id="nameDialog" class="name-dialog">
    <form id="nameForm" method="dialog">
      <h2>Who are you?</h2>
      <label>
        Your name
        <input id="nameInput" name="name" autocomplete="name" required maxlength="80" placeholder="" />
      </label>
      <button type="submit">Save name</button>
    </form>
  </dialog>

  <dialog id="proposalDialog" class="proposal-dialog">
    <form id="proposalForm" method="dialog">
      <div class="dialog-topline">
        <h2 id="proposalDialogTitle">Add event</h2>
        <button class="ghost-button" type="button" data-close-proposal aria-label="Close">X</button>
      </div>
      <label>
        Trip name
        <input name="title" required maxlength="120" placeholder="" />
      </label>
      <label>
        Location
        <input name="location" list="locationOptions" required maxlength="120" placeholder="Choose a saved place or type a new one" />
        <datalist id="locationOptions"></datalist>
      </label>
      <label>
        Year
        <input name="year" type="number" min="2026" max="2100" step="1" placeholder="" />
      </label>
      <div class="form-grid">
        <label>
          Start date
          <input name="startDate" type="date" />
        </label>
        <label>
          End date
          <input name="endDate" type="date" />
        </label>
      </div>
      <label>
        Notes
        <textarea name="summary" maxlength="1000" rows="4" placeholder="Why this spot? Lodging ideas, travel notes, rough plan..."></textarea>
      </label>
      <section class="subevent-editor">
        <div class="dialog-topline">
          <h3>Sub-events</h3>
          <button type="button" data-add-subevent>Add sub-event</button>
        </div>
        <div id="subEventRows" class="subevent-rows"></div>
      </section>
      <section class="link-editor">
        <div class="dialog-topline">
          <h3>Links</h3>
          <button type="button" data-add-link>Add link</button>
        </div>
        <div id="linkRows" class="link-rows"></div>
      </section>
      <button class="primary-action" type="submit">Save event</button>
    </form>
  </dialog>

  <template id="proposalTemplate">
    <article class="proposal-card">
      <div class="proposal-topline">
        <div>
          <p class="year"></p>
          <h2></h2>
        </div>
        <span class="status"></span>
      </div>
      <div class="proposal-actions">
        <a class="calendar-action" data-calendar-link target="_blank" rel="noreferrer">Add to Google Calendar</a>
        <button type="button" data-edit-proposal>Edit</button>
      </div>
      <p class="meta"></p>
      <p class="summary"></p>
      <section class="subevents"></section>
      <section class="event-meals"></section>
      <section class="proposal-links"></section>

      <div class="proposal-details">
        <section class="mini-calendar" aria-label="Event dates"></section>
        <section class="mini-map" aria-label="Event location"></section>
      </div>

      <div class="vote-row">
        <button data-vote="yes">Yes <span class="yes-count">0</span></button>
        <button data-vote="maybe">Maybe <span class="maybe-count">0</span></button>
        <button data-vote="no">No <span class="no-count">0</span></button>
      </div>

      <details class="vote-details">
        <summary>
          <span>Vote details</span>
          <strong class="vote-total">0</strong>
        </summary>
        <div class="vote-detail-list"></div>
      </details>

      <section class="comments">
        <h3>Comments</h3>
        <div class="comment-list"></div>
        <form class="comment-form">
          <input name="text" placeholder="Add a thought, concern, or idea" required />
          <button type="submit">Comment</button>
        </form>
      </section>
    </article>
  </template>

  <script src="/app.js" type="module"></script>
</body>
</html>
